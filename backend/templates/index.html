<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Service Monitor Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-y: auto;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0f1629 0%, #1a1f3a 100%);
            border-bottom: 1px solid rgba(0, 255, 170, 0.15);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, #00ffaa, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle { color: #7a8ba6; font-size: 13px; margin-top: 2px; }
        .status-indicators { display: flex; gap: 15px; align-items: center; }
        .indicator {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: #7a8ba6;
            background: rgba(255,255,255,0.04);
            padding: 6px 12px; border-radius: 20px;
        }
        .indicator .dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .dot.green { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .dot.red   { background: #ff4466; box-shadow: 0 0 8px #ff4466; }
        .dot.gray  { background: #555; }

        /* Main */
        .main { padding: 25px 30px 80px; max-width: 1200px; margin: 0 auto; }

        /* Service Grid */
        .section-title {
            font-size: 16px; font-weight: 700; color: #c0c8d8;
            margin-bottom: 15px;
            display: flex; align-items: center; gap: 8px;
        }
        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .service-card {
            background: linear-gradient(145deg, rgba(20,25,45,0.9), rgba(15,20,35,0.95));
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 18px;
            transition: all 0.3s;
        }
        .service-card:hover { border-color: rgba(0,255,170,0.2); transform: translateY(-2px); }
        .service-card .name {
            font-size: 18px; font-weight: 700; color: #fff;
            font-family: 'Courier New', monospace;
        }
        .service-card .time { font-size: 11px; color: #556; margin-top: 4px; }
        .service-card .badge {
            display: inline-block; padding: 4px 14px;
            border-radius: 20px; font-size: 12px; font-weight: 700;
            margin-top: 10px; text-transform: uppercase;
        }
        .badge.healthy   { background: rgba(0,255,136,0.12); color: #00ff88; border: 1px solid rgba(0,255,136,0.25); }
        .badge.crashed   { background: rgba(255,68,102,0.12); color: #ff4466; border: 1px solid rgba(255,68,102,0.25); animation: pulse-red 1.5s infinite; }
        .badge.recovered { background: rgba(0,170,255,0.12); color: #00aaff; border: 1px solid rgba(0,170,255,0.25); }
        .badge.unknown   { background: rgba(150,150,150,0.12); color: #999; border: 1px solid rgba(150,150,150,0.25); }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 5px rgba(255,68,102,0.3); }
            50%      { box-shadow: 0 0 20px rgba(255,68,102,0.6); }
        }

        /* Empty State */
        .empty-state {
            text-align: center; padding: 40px;
            color: #556; font-size: 14px;
            border: 2px dashed rgba(255,255,255,0.06);
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .empty-state code {
            display: block; margin-top: 10px;
            background: rgba(0,255,170,0.08); color: #00ffaa;
            padding: 10px; border-radius: 8px; font-size: 13px;
        }

        /* ── Resource Monitor Section ─────────────────────────── */
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .resource-card {
            background: linear-gradient(145deg, rgba(20,25,45,0.9), rgba(15,20,35,0.95));
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 18px;
        }
        .resource-card .res-label {
            font-size: 13px; font-weight: 600; color: #7a8ba6;
            margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .resource-card .res-value {
            font-size: 28px; font-weight: 800; color: #fff;
            margin-bottom: 10px;
        }
        .res-bar-bg {
            width: 100%; height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
        }
        .res-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease, background 0.6s ease;
        }
        .res-bar-fill.level-ok   { background: linear-gradient(90deg, #00ff88, #00cc66); box-shadow: 0 0 8px rgba(0,255,136,0.3); }
        .res-bar-fill.level-warn { background: linear-gradient(90deg, #ffaa00, #ff8800); box-shadow: 0 0 8px rgba(255,170,0,0.3); }
        .res-bar-fill.level-crit { background: linear-gradient(90deg, #ff4466, #ff2244); box-shadow: 0 0 12px rgba(255,68,102,0.5); animation: pulse-red 1.5s infinite; }
        .res-threshold {
            font-size: 10px; color: #556; margin-top: 6px;
            display: flex; justify-content: space-between;
        }

        /* Incidents */
        .incident-card {
            background: linear-gradient(145deg, rgba(25,15,20,0.9), rgba(20,12,18,0.95));
            border: 1px solid rgba(255,68,102,0.15);
            border-left: 3px solid #ff4466;
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        .incident-card.done {
            border-left-color: #00ff88;
            border-color: rgba(0,255,136,0.15);
            background: linear-gradient(145deg, rgba(10,25,20,0.9), rgba(8,20,15,0.95));
        }
        .incident-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px;
        }
        .incident-header .tag {
            font-size: 13px; font-weight: 700;
        }
        .tag.crash { color: #ff4466; }
        .tag.healed { color: #00ff88; }
        .incident-header .time { font-size: 12px; color: #556; }
        .incident-service {
            display: inline-block;
            background: rgba(255,255,255,0.06);
            padding: 2px 10px; border-radius: 6px;
            font-family: monospace; font-size: 13px; color: #aab;
            margin-bottom: 8px;
        }
        .ai-content {
            font-size: 13px; line-height: 1.7; color: #b0b8c8;
            background: rgba(0,0,0,0.2);
            padding: 12px; border-radius: 8px;
            overflow-y: visible;
        }
        .ai-content h2 { font-size: 15px; color: #fff; margin: 10px 0 5px; }
        .ai-content h3 { font-size: 14px; color: #00ccff; margin: 8px 0 4px; }
        .ai-content code {
            background: rgba(0,255,170,0.08); color: #00ffaa;
            padding: 1px 6px; border-radius: 4px; font-size: 12px;
        }
        .ai-content pre {
            background: #0a0e1a; padding: 10px; border-radius: 6px;
            overflow-x: auto; margin: 8px 0;
        }
        .ai-content ul, .ai-content ol { padding-left: 20px; margin: 5px 0; }
        .ai-content strong { color: #fff; }

        .loading-dots::after {
            content: ''; animation: dots 1.5s steps(4,end) infinite;
        }
        @keyframes dots {
            0%  { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        /* No incidents */
        .no-incidents {
            text-align: center; padding: 30px; color: #445;
            font-size: 14px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        @media (max-width: 768px) {
            .resource-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🛡️ AI Service Monitor</h1>
            <div class="subtitle">Real-time Auto Healing & AI Root Cause Analysis (Powered by Groq/Llama 3.1)</div>
        </div>
        <div class="status-indicators">
            <div class="indicator">
                <span class="dot" id="aiDot"></span>
                <span id="aiLabel">AI</span>
            </div>
            <div class="indicator">
                <span class="dot" id="emailDot"></span>
                <span id="emailLabel">Email</span>
            </div>
            <div class="indicator">
                <span class="dot green"></span>
                <span>Dashboard Live</span>
            </div>
        </div>
    </div>

    <div class="main">
        <!-- Service Cards -->
        <div class="section-title">📊 Monitored Services</div>
        <div id="serviceGrid" class="service-grid"></div>

        <!-- Resource Monitor -->
        <div class="section-title">⚙️ System Resources</div>
        <div class="resource-grid">
            <div class="resource-card">
                <div class="res-label"><span>🖥️ CPU Usage</span><span id="cpuIcon">✅</span></div>
                <div class="res-value" id="cpuValue">0%</div>
                <div class="res-bar-bg"><div class="res-bar-fill level-ok" id="cpuBar" style="width:0%"></div></div>
                <div class="res-threshold"><span>Ngưỡng: 90%</span><span id="cpuStatus">OK</span></div>
            </div>
            <div class="resource-card">
                <div class="res-label"><span>🧠 RAM Usage</span><span id="memIcon">✅</span></div>
                <div class="res-value" id="memValue">0%</div>
                <div class="res-bar-bg"><div class="res-bar-fill level-ok" id="memBar" style="width:0%"></div></div>
                <div class="res-threshold"><span>Ngưỡng: 85%</span><span id="memStatus">OK</span></div>
            </div>
            <div class="resource-card">
                <div class="res-label"><span>💾 Disk Usage</span><span id="diskIcon">✅</span></div>
                <div class="res-value" id="diskValue">0%</div>
                <div class="res-bar-bg"><div class="res-bar-fill level-ok" id="diskBar" style="width:0%"></div></div>
                <div class="res-threshold"><span>Ngưỡng: 90%</span><span id="diskStatus">OK</span></div>
            </div>
        </div>

        <!-- Incidents -->
        <div class="section-title">🔥 AI Incident Analysis Log</div>
        <div id="incidentList"></div>
    </div>

    <script>
        function md(text) {
            if (!text) return '';
            return text
                .replace(/### (.*)/g, '<h3>$1</h3>')
                .replace(/## (.*)/g, '<h2>$1</h2>')
                .replace(/# (.*)/g, '<h2>$1</h2>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/^\- (.*)/gm, '<li>$1</li>')
                .replace(/^\d+\. (.*)/gm, '<li>$1</li>')
                .replace(/\n/g, '<br>');
        }

        const badgeText = {recovered:'⚡ RECOVERED', healthy:'✅ HEALTHY', crashed:'🔴 CRASHED'};
        let prevIncJson = '';

        function getBarLevel(pct, threshold) {
            if (pct >= threshold) return 'level-crit';
            if (pct >= threshold * 0.7) return 'level-warn';
            return 'level-ok';
        }

        function updateResource(id, pct, threshold) {
            const bar = document.getElementById(id + 'Bar');
            const val = document.getElementById(id + 'Value');
            const icon = document.getElementById(id + 'Icon');
            const status = document.getElementById(id + 'Status');

            if (val) val.textContent = pct + '%';
            if (bar) {
                bar.style.width = Math.min(pct, 100) + '%';
                bar.className = 'res-bar-fill ' + getBarLevel(pct, threshold);
            }
            if (pct >= threshold) {
                if (icon) icon.textContent = '🔴';
                if (status) { status.textContent = '⚠️ VUOT NGUONG'; status.style.color = '#ff4466'; }
            } else if (pct >= threshold * 0.7) {
                if (icon) icon.textContent = '⚠️';
                if (status) { status.textContent = 'Cảnh giác'; status.style.color = '#ffaa00'; }
            } else {
                if (icon) icon.textContent = '✅';
                if (status) { status.textContent = 'OK'; status.style.color = '#00ff88'; }
            }
        }

        function updateUI() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    // 1. Indicators
                    document.getElementById('aiDot').className = 'dot ' + (data.ai_connected ? 'green' : 'red');
                    document.getElementById('aiLabel').textContent = data.ai_connected ? 'AI ✓' : 'AI ✗';
                    document.getElementById('emailDot').className = 'dot ' + (data.email_configured ? 'green' : 'red');
                    document.getElementById('emailLabel').textContent = data.email_configured ? 'Email ✓' : 'Email ✗';

                    // 2. Service cards — DOM manipulation
                    const grid = document.getElementById('serviceGrid');
                    const services = Object.values(data.services);
                    if (services.length === 0 && !grid.querySelector('.empty-state')) {
                        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
                            Chưa có service nào được theo dõi.<br>Agent sẽ tự đăng ký khi chạy lần đầu.
                            <code>sudo /opt/ai-service-monitor/agent/ai_monitor_service.sh httpd</code>
                        </div>`;
                    }
                    services.forEach(s => {
                        let card = document.getElementById('svc-' + s.service_name);
                        if (!card) {
                            const empty = grid.querySelector('.empty-state');
                            if (empty) empty.remove();
                            card = document.createElement('div');
                            card.className = 'service-card';
                            card.id = 'svc-' + s.service_name;
                            card.innerHTML = `<div class="name">${s.service_name}</div>
                                <div class="time" id="time-${s.service_name}"></div>
                                <span class="badge" id="badge-${s.service_name}"></span>`;
                            grid.appendChild(card);
                        }
                        const timeEl = document.getElementById('time-' + s.service_name);
                        const badgeEl = document.getElementById('badge-' + s.service_name);
                        if (timeEl) timeEl.textContent = 'Last check: ' + s.last_check;
                        if (badgeEl) {
                            badgeEl.textContent = badgeText[s.status] || '⏳ WAITING';
                            badgeEl.className = 'badge ' + s.status;
                        }
                    });

                    // 3. Resources — cập nhật thanh progress bar (textContent only, no layout thrash)
                    if (data.resources) {
                        updateResource('cpu', data.resources.cpu, 90);
                        updateResource('mem', data.resources.mem, 85);
                        updateResource('disk', data.resources.disk, 90);
                    }

                    // 4. Incidents — chỉ render khi data thay đổi
                    const incJson = JSON.stringify(data.incidents);
                    if (incJson !== prevIncJson) {
                        prevIncJson = incJson;
                        const scrollY = window.scrollY;
                        const list = document.getElementById('incidentList');
                        if (data.incidents.length === 0) {
                            list.innerHTML = '<div class="no-incidents">✅ Chưa có sự cố nào. Hệ thống bình thường.</div>';
                        } else {
                            list.innerHTML = data.incidents.map(inc => `
                                <div class="incident-card ${inc.ai_done ? 'done' : ''}">
                                    <div class="incident-header">
                                        <span class="tag ${inc.ai_done ? 'healed' : 'crash'}">${inc.ai_done ? '✅ Auto-Healed' : '🔴 Processing...'}</span>
                                        <span class="time">${inc.time}</span>
                                    </div>
                                    <div class="incident-service">${inc.service}</div>
                                    <div class="ai-content">${md(inc.ai_analysis)}</div>
                                </div>
                            `).join('');
                        }
                        requestAnimationFrame(() => window.scrollTo(0, scrollY));
                    }
                })
                .catch(() => {});
        }

        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
